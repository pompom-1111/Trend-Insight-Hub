<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend Insight Hub - 趨勢中心</title>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #1a202c;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #edf2f7;
            color: #4a5568;
            font-weight: 600;
        }
        .rank {
            font-weight: bold;
            color: #3182ce;
            width: 80px;
        }
        .song-title {
            font-weight: 500;
        }
        .artist {
            color: #718096;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎵 Trend Insight Hub 流行音樂趨勢</h1>
    
    <table>
        <thead>
            <tr>
                <th>排名</th>
                <th>歌曲名稱</th>
                <th>歌手</th>
            </tr>
        </thead>
        <tbody>
            {% for song in songs %}
            <tr>
                <td class="rank">第 {{ song.rank }} 名</td>
                <td class="song-title">{{ song.song_name }}</td>
                <td class="artist">{{ song.artist_name }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" style="text-align: center; color: #a0aec0;">目前資料庫中沒有資料，請先執行爬蟲腳本！</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
